<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Otvet — Форум</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #d0d0d0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }

        .app {
            max-width: 1000px;
            width: 100%;
            background: #141414;
            border-radius: 28px;
            padding: 30px 35px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            padding-bottom: 18px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 30px;
            font-weight: 700;
            color: #eee;
            letter-spacing: 1px;
        }
        .logo span {
            color: #666;
            font-weight: 300;
        }
        .logo .admin-badge {
            font-size: 14px;
            background: #2a1a1a;
            color: #cc7777;
            padding: 2px 14px;
            border-radius: 40px;
            margin-left: 12px;
            border: 1px solid #4a2a2a;
            font-weight: 400;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .user-info .username {
            color: #aaa;
            font-weight: 500;
        }
        .user-info .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eee;
            font-weight: 700;
            font-size: 16px;
            border: 1px solid #444;
        }
        .user-info .avatar.admin-avatar {
            border-color: #885555;
            background: #2a1a1a;
            color: #cc7777;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header-actions button {
            background: #222;
            border: 1px solid #333;
            color: #ccc;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .header-actions button:hover {
            background: #333;
            border-color: #555;
            color: #fff;
        }
        .header-actions .admin-btn {
            border-color: #4a3a2a;
            color: #ccaa77;
        }
        .header-actions .admin-btn:hover {
            background: #2a1a0a;
            border-color: #6a4a2a;
            color: #eedd88;
        }
        .header-actions .logout-btn {
            border-color: #4a2a2a;
            color: #aa6666;
        }
        .header-actions .logout-btn:hover {
            background: #2a1010;
            border-color: #6a2a2a;
            color: #cc7777;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 22px;
        }

        .nav button {
            background: #1c1c1c;
            border: 1px solid #2e2e2e;
            color: #bbb;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav button:hover {
            background: #2c2c2c;
            border-color: #4a4a4a;
            color: #fff;
        }
        .nav .active {
            background: #333;
            border-color: #5a5a5a;
            color: #fff;
        }

        .search-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .search-row input {
            flex: 1;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 40px;
            padding: 14px 24px;
            color: #ddd;
            font-size: 15px;
            outline: none;
            transition: 0.25s;
        }
        .search-row input:focus {
            border-color: #555;
            background: #1a1a1a;
        }
        .search-row button {
            background: #222;
            border: 1px solid #3a3a3a;
            color: #ccc;
            padding: 0 32px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-row button:hover {
            background: #333;
            color: #fff;
        }

        .topics-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 20px;
        }

        .topic-item {
            background: #121212;
            border-radius: 14px;
            padding: 16px 22px;
            border: 1px solid #222;
            cursor: pointer;
            transition: 0.15s;
            position: relative;
        }
        .topic-item:hover {
            background: #1e1e1e;
            border-color: #3a3a3a;
        }
        .topic-item .topic-title {
            color: #eee;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .topic-item .topic-meta {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .topic-item .topic-meta span {
            color: #888;
        }
        .topic-item .topic-meta .author {
            color: #aaa;
        }
        .topic-item .admin-delete-topic {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: 1px solid #4a2a2a;
            color: #885555;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: none;
        }
        .topic-item .admin-delete-topic:hover {
            background: #2a1010;
            border-color: #6a2a2a;
            color: #cc7777;
        }
        .topic-item:hover .admin-delete-topic {
            display: block;
        }

        .thread-view {
            display: none;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 24px 28px;
            margin: 6px 0 18px 0;
        }
        .thread-view.show {
            display: block;
        }

        .thread-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            padding-bottom: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .thread-header h2 {
            color: #eee;
            font-size: 22px;
        }
        .thread-header .back-btn {
            background: #1c1c1c;
            border: 1px solid #333;
            color: #aaa;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .thread-header .back-btn:hover {
            background: #2a2a2a;
            color: #fff;
        }

        .post {
            background: #151515;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid #222;
            position: relative;
        }
        .post .post-author {
            color: #aaa;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .post .post-author .admin-tag {
            font-size: 12px;
            background: #2a1a1a;
            color: #cc7777;
            padding: 1px 12px;
            border-radius: 30px;
            margin-left: 8px;
            border: 1px solid #4a2a2a;
            font-weight: 400;
        }
        .post .post-date {
            color: #555;
            font-size: 13px;
            margin-left: 12px;
            font-weight: 400;
        }
        .post .post-body {
            color: #ccc;
            line-height: 1.6;
            margin-top: 6px;
        }
        .post .admin-delete-post {
            position: absolute;
            right: 16px;
            top: 16px;
            background: transparent;
            border: 1px solid #4a2a2a;
            color: #885555;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: none;
        }
        .post .admin-delete-post:hover {
            background: #2a1010;
            border-color: #6a2a2a;
            color: #cc7777;
        }
        .post:hover .admin-delete-post {
            display: block;
        }

        .reply-area {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .reply-area textarea {
            background: #111;
            border: 1px solid #2e2e2e;
            border-radius: 14px;
            padding: 14px 18px;
            color: #ddd;
            font-size: 15px;
            outline: none;
            min-height: 80px;
            resize: vertical;
            transition: 0.2s;
        }
        .reply-area textarea:focus {
            border-color: #555;
            background: #181818;
        }
        .reply-area button {
            align-self: flex-end;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #ddd;
            padding: 10px 32px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .reply-area button:hover {
            background: #3a3a3a;
            color: #fff;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 28px;
            padding: 35px 40px;
            max-width: 440px;
            width: 94%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.9);
        }
        .modal h2 {
            color: #eee;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .modal .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 22px;
        }
        .modal input, .modal select, .modal textarea {
            width: 100%;
            background: #111;
            border: 1px solid #2e2e2e;
            border-radius: 14px;
            padding: 14px 18px;
            color: #ddd;
            font-size: 15px;
            outline: none;
            margin-bottom: 14px;
            transition: 0.2s;
        }
        .modal input:focus, .modal select:focus, .modal textarea:focus {
            border-color: #555;
            background: #181818;
        }
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        .modal select option {
            background: #1a1a1a;
        }
        .modal .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .modal .modal-actions button {
            padding: 10px 30px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #3a3a3a;
            background: #222;
            color: #ccc;
            transition: 0.2s;
            flex: 1;
            min-width: 100px;
        }
        .modal .modal-actions button:hover {
            background: #333;
            color: #fff;
        }
        .modal .modal-actions .btn-primary {
            background: #2a2a2a;
            border-color: #555;
            color: #eee;
        }
        .modal .modal-actions .btn-primary:hover {
            background: #3d3d3d;
        }
        .modal .switch-mode {
            text-align: center;
            margin-top: 16px;
            color: #666;
            font-size: 14px;
        }
        .modal .switch-mode a {
            color: #888;
            cursor: pointer;
            text-decoration: underline;
            transition: 0.2s;
        }
        .modal .switch-mode a:hover {
            color: #ccc;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #222;
            padding-top: 18px;
            margin-top: 6px;
            color: #4a4a4a;
            font-size: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-bar a {
            color: #555;
            text-decoration: none;
            margin-left: 18px;
            transition: 0.2s;
            cursor: pointer;
        }
        .status-bar a:hover {
            color: #aaa;
        }

        @media (max-width: 700px) {
            .app { padding: 18px 14px; }
            .topic-item { padding: 14px 16px; }
            .modal { padding: 24px 20px; }
            .thread-view { padding: 18px 16px; }
            .header-actions button { padding: 6px 14px; font-size: 13px; }
            .topic-item .admin-delete-topic { display: none; }
            .post .admin-delete-post { display: none; }
        }
    </style>
</head>
<body>

<div class="app">

    <div class="header">
        <div class="logo">
            BLACK <span>OTVET</span>
            <span class="admin-badge" id="adminBadge" style="display:none;">👑 АДМИН</span>
        </div>
        <div class="user-info" id="userInfo">
            <div class="avatar" id="avatar">?</div>
            <span class="username" id="usernameDisplay">Гость</span>
        </div>
        <div class="header-actions" id="headerActions">
            <button onclick="openAuthModal('login')">🔑 Войти</button>
            <button onclick="openAuthModal('register')">📝 Регистрация</button>
        </div>
    </div>

    <div class="nav">
        <button class="active" data-cat="all" onclick="filterCategory('all', this)">📋 Все темы</button>
        <button data-cat="general" onclick="filterCategory('general', this)">💬 Общий</button>
        <button data-cat="tech" onclick="filterCategory('tech', this)">⚙️ Техподдержка</button>
        <button data-cat="offtop" onclick="filterCategory('offtop', this)">🎉 Офтоп</button>
    </div>

    <div class="search-row">
        <input type="text" id="searchInput" placeholder="Поиск по темам..." oninput="searchTopics()">
        <button onclick="searchTopics()">🔍 Найти</button>
    </div>

    <div id="topicsList" class="topics-list">
        <div style="text-align:center; padding:60px 0; color:#444; font-size:18px;">
            📭 Пока нет ни одной темы<br>
            <span style="font-size:14px; color:#333;">Зарегистрируйся и создай первую!</span>
        </div>
    </div>

    <div id="threadView" class="thread-view">
        <div class="thread-header">
            <h2 id="threadTitle">Заголовок темы</h2>
            <button class="back-btn" onclick="closeThread()">← Назад</button>
        </div>
        <div id="postsContainer"></div>
        <div class="reply-area">
            <textarea id="replyInput" placeholder="Написать ответ..."></textarea>
            <button onclick="addReply()">📤 Ответить</button>
        </div>
    </div>

    <div class="status-bar">
        <span id="counter">Тем: 0</span>
        <div>
            <a onclick="refreshForum()">Обновить</a>
            <a onclick="openModal()">Создать тему</a>
        </div>
    </div>
</div>

<!-- МОДАЛКА АВТОРИЗАЦИИ -->
<div id="authModal" class="modal-overlay">
    <div class="modal">
        <h2 id="authTitle">Вход в аккаунт</h2>
        <div class="subtitle" id="authSubtitle">Войдите, чтобы участвовать в обсуждениях</div>
        <input type="text" id="authLogin" placeholder="Логин">
        <input type="password" id="authPassword" placeholder="Пароль">
        <input type="password" id="authPassword2" placeholder="Повторите пароль" style="display:none;">
        <div class="modal-actions">
            <button onclick="closeAuthModal()">Отмена</button>
            <button class="btn-primary" id="authSubmitBtn" onclick="submitAuth()">Войти</button>
        </div>
        <div class="switch-mode">
            <span id="authSwitchText">Нет аккаунта? <a onclick="switchAuthMode()">Зарегистрируйтесь</a></span>
        </div>
    </div>
</div>

<!-- МОДАЛКА НОВОЙ ТЕМЫ -->
<div id="modal" class="modal-overlay">
    <div class="modal">
        <h2>📝 Создать тему</h2>
        <div class="subtitle">Поделись своей мыслью с сообществом</div>
        <input type="text" id="newTitle" placeholder="Заголовок темы">
        <select id="newCategory">
            <option value="general">💬 Общий</option>
            <option value="tech">⚙️ Техподдержка</option>
            <option value="offtop">🎉 Офтоп</option>
        </select>
        <textarea id="newBody" placeholder="Текст первого сообщения..."></textarea>
        <div class="modal-actions">
            <button onclick="closeModal()">Отмена</button>
            <button class="btn-primary" onclick="createTopic()">✅ Создать</button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  АДМИН — ЗАДАЙ СВОЙ ЛОГИН ЗДЕСЬ!
    // ============================================================
    const ADMIN_USERNAME = 'admin';   // <--- НАПИШИ СВОЙ ЛОГИН

    // ============================================================
    //  СИСТЕМА АККАУНТОВ
    // ============================================================
    let currentUser = null;
    let authMode = 'login';

    function getUsers() {
        const data = localStorage.getItem('forum_users');
        return data ? JSON.parse(data) : {};
    }

    function saveUsers(users) {
        localStorage.setItem('forum_users', JSON.stringify(users));
    }

    function loadSession() {
        const session = localStorage.getItem('forum_session');
        if (session) {
            currentUser = JSON.parse(session);
            updateUI();
        }
    }

    function saveSession(user) {
        currentUser = user;
        localStorage.setItem('forum_session', JSON.stringify(user));
        updateUI();
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('forum_session');
        updateUI();
        render();
    }

    function isAdmin() {
        return currentUser && currentUser.username === ADMIN_USERNAME;
    }

    // ============================================================
    //  UI АВТОРИЗАЦИИ
    // ============================================================
    function updateUI() {
        const avatar = document.getElementById('avatar');
        const usernameDisplay = document.getElementById('usernameDisplay');
        const actions = document.getElementById('headerActions');
        const adminBadge = document.getElementById('adminBadge');

        if (currentUser) {
            avatar.textContent = currentUser.username.charAt(0).toUpperCase();
            usernameDisplay.textContent = currentUser.username;
            if (isAdmin()) {
                avatar.classList.add('admin-avatar');
                adminBadge.style.display = 'inline';
            } else {
                avatar.classList.remove('admin-avatar');
                adminBadge.style.display = 'none';
            }

            let adminBtn = '';
            if (isAdmin()) {
                adminBtn = `<button class="admin-btn" onclick="clearAllData()">🗑️ Очистить всё</button>`;
            }

            actions.innerHTML = `
                <button onclick="openModal()">➕ Новая тема</button>
                <button onclick="refreshForum()">🔄 Обновить</button>
                ${adminBtn}
                <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
            `;
        } else {
            avatar.textContent = '?';
            avatar.classList.remove('admin-avatar');
            usernameDisplay.textContent = 'Гость';
            adminBadge.style.display = 'none';
            actions.innerHTML = `
                <button onclick="openAuthModal('login')">🔑 Войти</button>
                <button onclick="openAuthModal('register')">📝 Регистрация</button>
            `;
        }
    }

    // ============================================================
    //  МОДАЛКА АВТОРИЗАЦИИ
    // ============================================================
    function openAuthModal(mode) {
        authMode = mode || 'login';
        const modal = document.getElementById('authModal');
        const title = document.getElementById('authTitle');
        const subtitle = document.getElementById('authSubtitle');
        const submitBtn = document.getElementById('authSubmitBtn');
        const pwd2 = document.getElementById('authPassword2');
        const switchText = document.getElementById('authSwitchText');

        document.getElementById('authLogin').value = '';
        document.getElementById('authPassword').value = '';
        document.getElementById('authPassword2').value = '';

        if (mode === 'register') {
            title.textContent = '📝 Регистрация';
            subtitle.textContent = 'Создайте аккаунт, чтобы участвовать в форуме';
            submitBtn.textContent = 'Зарегистрироваться';
            pwd2.style.display = 'block';
            switchText.innerHTML = 'Уже есть аккаунт? <a onclick="switchAuthMode()">Войдите</a>';
        } else {
            title.textContent = '🔑 Вход в аккаунт';
            subtitle.textContent = 'Войдите, чтобы участвовать в обсуждениях';
            submitBtn.textContent = 'Войти';
            pwd2.style.display = 'none';
            switchText.innerHTML = 'Нет аккаунта? <a onclick="switchAuthMode()">Зарегистрируйтесь</a>';
        }

        modal.classList.add('show');
    }

    function closeAuthModal() {
        document.getElementById('authModal').classList.remove('show');
    }

    function switchAuthMode() {
        const newMode = authMode === 'login' ? 'register' : 'login';
        openAuthModal(newMode);
    }

    // ============================================================
    //  ОБРАБОТКА АВТОРИЗАЦИИ
    // ============================================================
    function submitAuth() {
        const login = document.getElementById('authLogin').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        const password2 = document.getElementById('authPassword2').value.trim();

        if (!login || !password) {
            alert('Заполните все поля!');
            return;
        }

        const users = getUsers();

        if (authMode === 'register') {
            if (password !== password2) {
                alert('Пароли не совпадают!');
                return;
            }
            if (users[login]) {
                alert('Пользователь с таким логином уже существует!');
                return;
            }
            if (password.length < 4) {
                alert('Пароль должен быть минимум 4 символа');
                return;
            }

            users[login] = { username: login, password: password };
            saveUsers(users);
            alert('✅ Регистрация успешна! Теперь войдите в аккаунт.');
            openAuthModal('login');
            return;
        }

        if (!users[login]) {
            alert('❌ Пользователь не найден!');
            return;
        }
        if (users[login].password !== password) {
            alert('❌ Неверный пароль!');
            return;
        }

        saveSession({ username: login });
        closeAuthModal();
        render();
        alert('✅ Добро пожаловать, ' + login + '!');
    }

    document.getElementById('authModal').addEventListener('click', function(e) {
        if (e.target === this) closeAuthModal();
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeAuthModal();
    });

    // ============================================================
    //  ДАННЫЕ ФОРУМА
    // ============================================================
    let topics = [];
    let nextId = 1;
    let currentCategory = 'all';
    let currentTopicId = null;

    function loadForumData() {
        const saved = localStorage.getItem('forum_topics');
        if (saved) {
            const data = JSON.parse(saved);
            topics = data.topics || [];
            nextId = data.nextId || 1;
        } else {
            topics = [];
            nextId = 1;
            saveForumData();
        }
    }

    function saveForumData() {
        localStorage.setItem('forum_topics', JSON.stringify({ topics, nextId }));
    }

    // ============================================================
    //  ОТРИСОВКА
    // ============================================================
    function render() {
        const list = document.getElementById('topicsList');
        const query = document.getElementById('searchInput').value.toLowerCase();
        let filtered = topics;

        if (currentCategory !== 'all') {
            filtered = filtered.filter(t => t.category === currentCategory);
        }

        if (query) {
            filtered = filtered.filter(t =>
                t.title.toLowerCase().includes(query) ||
                t.author.toLowerCase().includes(query) ||
                t.posts.some(p => p.body.toLowerCase().includes(query))
            );
        }

        filtered.sort((a, b) => b.id - a.id);

        if (filtered.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding:60px 0; color:#444; font-size:18px;">📭 Нет тем</div>`;
        } else {
            list.innerHTML = filtered.map(t => {
                const deleteBtn = isAdmin() ? `
                    <button class="admin-delete-topic" onclick="event.stopPropagation(); deleteTopic(${t.id})">✕</button>
                ` : '';
                return `
                    <div class="topic-item" onclick="openThread(${t.id})">
                        <div class="topic-title">${t.title}</div>
                        <div class="topic-meta">
                            <span>👤 <span class="author">${t.author}</span> &nbsp;•&nbsp; ${t.date}</span>
                            <span>💬 ${t.posts.length} ответов</span>
                        </div>
                        ${deleteBtn}
                    </div>
                `;
            }).join('');
        }

        document.getElementById('counter').textContent = `Тем: ${topics.length}`;
        saveForumData();
    }

    // ============================================================
    //  ОТКРЫТЬ/ЗАКРЫТЬ ТЕМУ
    // ============================================================
    function openThread(id) {
        if (!currentUser) {
            alert('⚠️ Войдите в аккаунт, чтобы читать темы!');
            openAuthModal('login');
            return;
        }

        currentTopicId = id;
        const topic = topics.find(t => t.id === id);
        if (!topic) return;

        document.getElementById('threadTitle').textContent = topic.title;
        const container = document.getElementById('postsContainer');

        container.innerHTML = topic.posts.map((p, index) => {
            const isAdminPost = p.author === Nepridumal384;
            const adminTag = isAdminPost ? `<span class="admin-tag">👑 Админ</span>` : '';
            const deleteBtn = isAdmin() ? `
                <button class="admin-delete-post" onclick="deletePost(${topic.id}, ${index})">✕</button>
            ` : '';
            return `
                <div class="post">
                    <div class="post-author">
                        ${p.author} ${adminTag}
                        <span class="post-date">${p.date}</span>
                    </div>
                    <div class="post-body">${p.body}</div>
                    ${deleteBtn}
                </div>
            `;
        }).join('');

        document.getElementById('threadView').classList.add('show');
        document.getElementById('topicsList').style.display = 'none';
        document.getElementById('replyInput').value = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closeThread() {
        document.getElementById('threadView').classList.remove('show');
        document.getElementById('topicsList').style.display = 'block';
        currentTopicId = null;
        render();
    }

    // ============================================================
    //  АДМИН-ФУНКЦИИ
    // ============================================================
    function deleteTopic(id) {
        if (!isAdmin()) return;
        if (!confirm('Удалить эту тему со всеми ответами?')) return;
        topics = topics.filter(t => t.id !== id);
        if (currentTopicId === id) closeThread();
        render();
    }

    function deletePost(topicId, postIndex) {
        if (!isAdmin()) return;
        const topic = topics.find(t => t.id === topicId);
        if (!topic) return;
        if (!confirm('Удалить этот пост?')) return;
        topic.posts.splice(postIndex, 1);
        if (topic.posts.length === 0) {
            deleteTopic(topicId);
        } else {
            openThread(topicId);
            render();
        }
    }

    function clearAllData() {
        if (!isAdmin()) return;
        if (!confirm('⚠️ УДАЛИТЬ ВСЕ ТЕМЫ И ПОСТЫ? Это необратимо!')) return;
        if (!confirm('Точно?!')) return;
        topics = [];
        nextId = 1;
        saveForumData();
        closeThread();
        render();
        alert('✅ Все темы удалены!');
    }

    // ============================================================
    //  ДОБАВИТЬ ОТВЕТ
    // ============================================================
    function addReply() {
        if (!currentUser) {
            alert('⚠️ Войдите в аккаунт, чтобы отвечать!');
            openAuthModal('login');
            return;
        }

        if (currentTopicId === null) return;
        const input = document.getElementById('replyInput');
        const text = input.value.trim();
        if (!text) {
            alert('Напиши текст ответа!');
            return;
        }

        const topic = topics.find(t => t.id === currentTopicId);
        if (!topic) return;

        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

        topic.posts.push({
            author: currentUser.username,
            date: 'Сегодня, ' + timeStr,
            body: text
        });

        input.value = '';
        openThread(currentTopicId);
        render();
    }

    // ============================================================
    //  СОЗДАТЬ НОВУЮ ТЕМУ
    // ============================================================
    function openModal() {
        if (!currentUser) {
            alert('⚠️ Войдите в аккаунт, чтобы создать тему!');
            openAuthModal('login');
            return;
        }
        document.getElementById('modal').classList.add('show');
        document.getElementById('newTitle').value = '';
        document.getElementById('newBody').value = '';
        document.getElementById('newCategory').value = 'general';
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('show');
    }

    function createTopic() {
        if (!currentUser) return;

        const title = document.getElementById('newTitle').value.trim();
        const category = document.getElementById('newCategory').value;
        const body = document.getElementById('newBody').value.trim();

        if (!title || !body) {
            alert('Заполни заголовок и текст!');
            return;
        }

        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

        const newTopic = {
            id: nextId++,
            title: title,
            category: category,
            author: currentUser.username,
            date: 'Сегодня, ' + timeStr,
            posts: [
                { author: currentUser.username, date: 'Сегодня, ' + timeStr, body: body }
            ]
        };

        topics.push(newTopic);
        closeModal();
        render();
        openThread(newTopic.id);
    }

    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    // ============================================================
    //  ФИЛЬТРЫ, ПОИСК, ОБНОВЛЕНИЕ
    // ============================================================
    function filterCategory(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.nav button[data-cat]').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        if (currentTopicId !== null) closeThread();
        render();
    }

    function searchTopics() {
        if (currentTopicId !== null) closeThread();
        render();
    }

    function refreshForum() {
        if (currentTopicId !== null) closeThread();
        render();
    }

    // ============================================================
    //  СТАРТ
    // ============================================================
    loadSession();
    loadForumData();
    render();
</script>

</body>
</html>
